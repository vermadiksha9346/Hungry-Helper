<!DOCTYPE html>
<html>
<head>
    <title>Food Assistant Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
        }

        .container {
            margin-top: 100px;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 40px;
        }

        p {
            color: #ffffff;
            font-size: 18px;
        }

        .card {
            background: white;
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        button {
            background-color: #ff6f61;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }

        button:hover {
            background-color: #ff3b2f;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🍔 Food Assistant Chatbot</h1>
        <p>Order food, explore menu, and get recommendations instantly!</p>

        <div class="card">
            <h3>Start Chatting</h3>
            <p>Click the chat icon to begin your order.</p>
            <button>Order Now</button>
            <button>View Menu</button>
        </div>
    </div>

    <!-- Watson Assistant Script -->
    <script>
      window.watsonAssistantChatOptions = {
        integrationID: "9ad5c384-ae26-4596-a1b8-077eb159439c", 
        region: "eu-de", 
        serviceInstanceID: "cc32a972-79fe-497f-b8ee-c375acd1d833", 
        onLoad: async (instance) => { await instance.render(); }
      };

      setTimeout(function(){
        const t = document.createElement('script');
        t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
                + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
                + "/WatsonAssistantChatEntry.js";
        document.head.appendChild(t);
      });
    </script>

</body>
</html>
